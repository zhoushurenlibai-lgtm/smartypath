<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smartypath — 编辑后台</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@700&display=swap');
  :root{--ink:#0D0F14;--surface:#13151C;--surface2:#1A1D28;--teal:#00D4AA;--teal-dim:#00b891;--gold:#F5C842;--rose:#FF6B6B;--cream:#F0EDE6;--muted:#7A8299;--border:rgba(0,212,170,0.12);--border2:rgba(255,255,255,0.06);--serif:'Noto Serif SC',serif;--sans:'Noto Sans SC',sans-serif;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--ink);color:var(--cream);font-family:var(--sans);line-height:1.6;}

  /* LOGIN */
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .login-box{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:52px 44px;width:100%;max-width:360px;text-align:center;}
  .login-box .logo{font-family:var(--serif);font-size:1.4rem;color:var(--teal);margin-bottom:4px;}
  .login-box .sub{font-size:.82rem;color:var(--muted);margin-bottom:32px;}
  .login-box h2{font-family:var(--serif);font-size:1.4rem;margin-bottom:22px;}
  .fg{margin-bottom:14px;text-align:left;}
  .fg label{font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px;}
  .fg input{width:100%;background:var(--ink);border:1px solid var(--border2);border-radius:7px;padding:11px 14px;color:var(--cream);font-size:.9rem;font-family:var(--sans);outline:none;transition:border-color .2s;}
  .fg input:focus{border-color:var(--teal);}
  .fg input::placeholder{color:rgba(122,130,153,.35);}
  .btn-full{width:100%;padding:12px;background:var(--teal);color:var(--ink);border:none;border-radius:7px;font-size:.95rem;font-weight:700;font-family:var(--sans);cursor:pointer;transition:background .2s;margin-top:4px;}
  .btn-full:hover{background:var(--teal-dim);}

  /* LAYOUT */
  #admin-screen{display:none;min-height:100vh;flex-direction:column;}
  .top-nav{background:var(--surface);border-bottom:1px solid var(--border2);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .top-logo{font-family:var(--serif);font-size:1.05rem;color:var(--teal);}
  .top-badge{font-size:.68rem;background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.18);padding:2px 9px;border-radius:3px;margin-left:8px;letter-spacing:.06em;}
  .top-right{display:flex;align-items:center;gap:10px;}
  .top-clock{font-size:.78rem;color:var(--muted);}
  .btn-sm{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:6px 14px;border-radius:5px;font-size:.78rem;font-family:var(--sans);cursor:pointer;transition:all .2s;}
  .btn-sm:hover{border-color:var(--teal);color:var(--teal);}
  .btn-sm.active{background:rgba(0,212,170,.1);border-color:var(--teal);color:var(--teal);}

  /* STATS */
  .stats-row{background:var(--surface2);border-bottom:1px solid var(--border2);padding:12px 24px;display:flex;gap:28px;flex-wrap:wrap;flex-shrink:0;}
  .sc{display:flex;align-items:center;gap:7px;font-size:.82rem;}
  .sc .n{font-weight:700;color:var(--teal);}
  .sc .l{color:var(--muted);}
  .sc.gold .n{color:var(--gold);}
  .sc.rose .n{color:var(--rose);}
  .sc.blue .n{color:#7eb8ff;}

  /* TABS */
  .section-tabs{display:flex;border-bottom:1px solid var(--border2);background:var(--surface);flex-shrink:0;}
  .stab{background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:.86rem;color:var(--muted);padding:12px 24px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;font-weight:500;}
  .stab.active{color:var(--teal);border-bottom-color:var(--teal);}
  .stab .badge-count{display:inline-block;background:var(--gold);color:var(--ink);font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:5px;}

  /* MAIN AREA */
  .main-area{display:flex;flex:1;overflow:hidden;min-height:0;}

  /* LEFT LIST */
  .list-panel{width:320px;flex-shrink:0;border-right:1px solid var(--border2);overflow-y:auto;background:var(--surface);}
  .list-filter{padding:12px 16px;border-bottom:1px solid var(--border2);display:flex;gap:6px;}
  .ftab{background:none;border:none;cursor:pointer;font-family:var(--sans);font-size:.75rem;color:var(--muted);padding:4px 11px;border-radius:4px;transition:all .2s;}
  .ftab.active{background:rgba(0,212,170,.1);color:var(--teal);}
  .list-item{padding:14px 16px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .15s;}
  .list-item:hover{background:var(--surface2);}
  .list-item.active{background:var(--surface2);border-left:3px solid var(--teal);}
  .li-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .li-id{font-size:.8rem;font-weight:600;}
  .li-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .dot-new{background:#7eb8ff;}
  .dot-pending{background:var(--gold);}
  .dot-done{background:var(--teal);}
  .li-meta{font-size:.73rem;color:var(--muted);margin-bottom:4px;}
  .li-preview{font-size:.78rem;color:rgba(240,237,230,.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .empty-list{padding:40px 20px;text-align:center;color:var(--muted);font-size:.85rem;}

  /* EDITOR / DETAIL */
  .detail-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .detail-empty{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:12px;color:var(--muted);}
  .detail-empty .icon{font-size:2.2rem;}

  /* ORDER DETAIL */
  .od-head{padding:16px 22px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;flex-shrink:0;}
  .od-head-left h3{font-size:.97rem;font-weight:600;margin-bottom:4px;}
  .od-head-left .meta{font-size:.75rem;color:var(--muted);line-height:1.6;}
  .od-head-right{display:flex;gap:8px;align-items:center;}
  .badge{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:3px;}
  .badge-new{background:rgba(126,184,255,.12);color:#7eb8ff;}
  .badge-pending{background:rgba(245,200,66,.12);color:var(--gold);}
  .badge-done{background:rgba(0,212,170,.12);color:var(--teal);}

  /* DUAL PANE EDITOR */
  .dual-pane{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden;}
  .pane{display:flex;flex-direction:column;overflow:hidden;}
  .pane+.pane{border-left:1px solid var(--border2);}
  .pane-head{padding:9px 16px;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
  .copy-btn{font-size:.7rem;color:var(--teal);cursor:pointer;background:none;border:none;font-family:var(--sans);}
  .copy-btn:hover{text-decoration:underline;}
  .pane-body{flex:1;overflow-y:auto;padding:16px;font-size:.87rem;line-height:1.75;color:rgba(240,237,230,.7);white-space:pre-wrap;}
  textarea.pane-edit{flex:1;background:transparent;border:none;outline:none;resize:none;font-family:var(--sans);font-size:.87rem;line-height:1.75;color:var(--cream);padding:16px;overflow-y:auto;}

  /* CONTACT DETAIL */
  .contact-detail{flex:1;overflow-y:auto;padding:22px;}
  .cd-section{margin-bottom:22px;}
  .cd-label{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .cd-value{font-size:.9rem;color:var(--cream);line-height:1.7;}
  .cd-note{font-size:.85rem;color:var(--muted);line-height:1.7;}
  .files-grid{display:flex;flex-direction:column;gap:8px;}
  .file-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:11px 16px;}
  .file-row .fname{font-size:.87rem;color:var(--cream);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;}
  .file-row .fmeta{font-size:.75rem;color:var(--muted);flex-shrink:0;}
  .btn-dl{background:var(--teal);color:var(--ink);border:none;border-radius:5px;padding:6px 14px;font-size:.78rem;font-weight:700;font-family:var(--sans);cursor:pointer;transition:background .2s;flex-shrink:0;}
  .btn-dl:hover{background:var(--teal-dim);}
  .reply-area{width:100%;background:var(--ink);border:1px solid var(--border2);border-radius:7px;padding:12px 14px;color:var(--cream);font-size:.87rem;font-family:var(--sans);outline:none;resize:vertical;min-height:100px;transition:border-color .2s;line-height:1.7;}
  .reply-area:focus{border-color:var(--teal);}
  .reply-area::placeholder{color:rgba(122,130,153,.35);}

  /* FOOTER BAR */
  .action-bar{padding:13px 22px;border-top:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;flex-wrap:wrap;gap:10px;}
  .action-info{font-size:.75rem;color:var(--muted);}
  .action-btns{display:flex;gap:8px;}
  .btn-save{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:9px 20px;border-radius:6px;font-size:.85rem;font-family:var(--sans);cursor:pointer;transition:all .2s;}
  .btn-save:hover{border-color:var(--teal);color:var(--teal);}
  .btn-done{background:var(--teal);color:var(--ink);border:none;padding:9px 22px;border-radius:6px;font-weight:700;font-size:.85rem;font-family:var(--sans);cursor:pointer;transition:all .2s;}
  .btn-done:hover{background:var(--teal-dim);}
  .btn-done:disabled{background:var(--muted);cursor:not-allowed;}

  /* CHANGE PASSWORD MODAL */
  .pw-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(13,15,20,.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;}
  .pw-overlay.active{display:flex;}
  .pw-box{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:40px 36px;width:100%;max-width:360px;position:relative;animation:fadeUp .25s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .pw-box .pw-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;}
  .pw-box .pw-close:hover{color:var(--cream);}
  .pw-box h3{font-family:var(--serif);font-size:1.3rem;margin-bottom:6px;}
  .pw-box .pw-sub{font-size:.8rem;color:var(--muted);margin-bottom:24px;}
  .pw-divider{border:none;border-top:1px solid var(--border2);margin:20px 0;}

  /* NEWS EDITOR */
  .news-form{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:16px;}
  .nf-group{display:flex;flex-direction:column;gap:5px;}
  .nf-label{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500;}
  .nf-input,.nf-select{width:100%;background:var(--ink);border:1px solid var(--border2);border-radius:6px;padding:10px 13px;color:var(--cream);font-size:.88rem;font-family:var(--sans);outline:none;transition:border-color .2s;appearance:none;}
  .nf-input:focus,.nf-select:focus{border-color:var(--teal);}
  .nf-input::placeholder{color:rgba(122,130,153,.35);}
  .nf-textarea{width:100%;background:var(--ink);border:1px solid var(--border2);border-radius:6px;padding:10px 13px;color:var(--cream);font-size:.88rem;font-family:var(--sans);outline:none;transition:border-color .2s;resize:vertical;min-height:200px;line-height:1.7;}
  .nf-textarea:focus{border-color:var(--teal);}
  .nf-textarea::placeholder{color:rgba(122,130,153,.35);}
  .nf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .publish-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}

  /* TOAST */
  #toast{position:fixed;bottom:22px;right:22px;z-index:999;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 18px;font-size:.85rem;color:var(--cream);display:none;box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:300px;}

  @media(max-width:900px){.dual-pane{grid-template-columns:1fr;}.pane+.pane{border-left:none;border-top:1px solid var(--border2);}}
  @media(max-width:640px){.list-panel{width:260px;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">Smartypath</div>
    <p class="sub">编辑后台管理系统</p>
    <h2>管理员登录</h2>
    <div class="fg"><label>账号</label><input type="text" id="adm-user" value="admin" placeholder="admin"></div>
    <div class="fg"><label>密码</label><input type="password" id="adm-pass" placeholder="输入管理员密码"></div>
    <button class="btn-full" id="login-btn" onclick="adminLogin()">进入后台</button>
    <p id="login-hint" style="font-size:.75rem;color:var(--rose);margin-top:10px;min-height:18px;"></p>
    <p style="font-size:.72rem;color:var(--muted);margin-top:6px;">默认密码：<code style="color:var(--teal);">smartypath2026</code></p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="top-nav">
    <div><span class="top-logo">Smartypath</span><span class="top-badge">编辑后台</span></div>
    <div class="top-right">
      <span class="top-clock" id="clock"></span>
      <button class="btn-sm" onclick="refresh()">🔄 刷新</button>
      <button class="btn-sm" onclick="openPwModal()">🔑 修改密码</button>
      <button class="btn-sm" onclick="adminLogout()">退出</button>
    </div>
  </div>
  <div class="stats-row" id="stats-row"></div>

  <!-- SECTION TABS -->
  <div class="section-tabs">
    <button class="stab active" id="stab-orders" onclick="switchSection('orders')">润色任务 <span class="badge-count" id="cnt-orders">0</span></button>
    <button class="stab" id="stab-contacts" onclick="switchSection('contacts')">联系咨询 / 文件 <span class="badge-count" id="cnt-contacts" style="background:var(--rose);">0</span></button>
    <button class="stab" id="stab-news" onclick="switchSection('news')">📰 发布文章</button>
  </div>

  <div class="main-area" id="main-area">
    <!-- LIST -->
    <div class="list-panel">
      <div class="list-filter" id="list-filter"></div>
      <div id="list-items"></div>
    </div>
    <!-- DETAIL -->
    <div class="detail-panel" id="detail-panel">
      <div class="detail-empty"><div class="icon">👈</div><p>从左侧选择一条记录</p></div>
    </div>
  </div>
</div>

<!-- CHANGE PASSWORD MODAL -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <button class="pw-close" onclick="closePwModal()">×</button>
    <h3>修改账号密码</h3>
    <p class="pw-sub">修改后立即生效，下次登录需使用新密码</p>
    <div class="fg"><label>账号名（可修改）</label><input type="text" id="new-user" placeholder="新账号名"></div>
    <hr class="pw-divider">
    <div class="fg"><label>当前密码</label><input type="password" id="cur-pass" placeholder="输入当前密码"></div>
    <div class="fg"><label>新密码</label><input type="password" id="new-pass" placeholder="至少 6 位字符"></div>
    <div class="fg"><label>确认新密码</label><input type="password" id="new-pass2" placeholder="再次输入新密码"></div>
    <button class="btn-full" onclick="changePassword()">保存修改</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL='https://knskxinizwnkpawunftn.supabase.co';
const SUPA_KEY='sb_publishable_AemNv1dP8JprYtPjTB0azA_alK9Qu_3';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

// ── CREDENTIALS ──
function getCreds(){
  const stored = localStorage.getItem('hp_admin_creds');
  if(stored){ try{ return JSON.parse(stored); }catch(e){} }
  return {user:'admin', pass:'smartypath2026'};
}
function saveCreds(c){ localStorage.setItem('hp_admin_creds', JSON.stringify(c)); }

// ── 登录失败锁定 ──
function getLoginState(){
  const s = localStorage.getItem('hp_login_state');
  if(s){ try{ return JSON.parse(s); }catch(e){} }
  return {fails:0, lockedUntil:0};
}
function saveLoginState(s){ localStorage.setItem('hp_login_state', JSON.stringify(s)); }
function checkLocked(){
  const s = getLoginState();
  if(s.lockedUntil && Date.now() < s.lockedUntil){
    const mins = Math.ceil((s.lockedUntil - Date.now()) / 60000);
    return `账号已锁定，请 ${mins} 分钟后再试`;
  }
  return null;
}
function updateLoginUI(){
  const s = getLoginState();
  const btn = document.getElementById('login-btn');
  const locked = checkLocked();
  if(locked){
    btn.disabled = true;
    btn.textContent = locked;
    btn.style.background = 'var(--muted)';
    setTimeout(updateLoginUI, 10000);
  } else {
    btn.disabled = false;
    btn.textContent = '进入后台';
    btn.style.background = '';
    const remaining = 3 - (s.fails || 0);
    const hint = document.getElementById('login-hint');
    if(hint) hint.textContent = s.fails > 0 ? `⚠️ 还剩 ${remaining} 次机会，失败后锁定 10 分钟` : '';
  }
}

// ── LOGIN ──
function adminLogin(){
  const locked = checkLocked();
  if(locked){ showToast('🔒 ' + locked); return; }
  const creds = getCreds();
  const inputUser = document.getElementById('adm-user').value.trim();
  const inputPass = document.getElementById('adm-pass').value;
  if(inputUser === creds.user && inputPass === creds.pass){
    // 登录成功，重置失败记录
    saveLoginState({fails:0, lockedUntil:0});
    sessionStorage.setItem('hp_admin_logged','1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').style.display='flex';
    refresh();
  } else {
    // 登录失败
    const s = getLoginState();
    s.fails = (s.fails || 0) + 1;
    if(s.fails >= 3){
      s.lockedUntil = Date.now() + 10 * 60 * 1000; // 锁定10分钟
      s.fails = 0;
      saveLoginState(s);
      showToast('🔒 连续错误3次，账号已锁定 10 分钟');
    } else {
      saveLoginState(s);
      showToast(`⚠️ 账号或密码错误，还剩 ${3 - s.fails} 次机会`);
    }
    document.getElementById('adm-pass').value = '';
    updateLoginUI();
  }
}
function adminLogout(){
  sessionStorage.removeItem('hp_admin_logged');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('admin-screen').style.display='none';
  document.getElementById('adm-pass').value='';
}
document.getElementById('adm-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') adminLogin(); });
// 预填账号
const _c = getCreds();
document.getElementById('adm-user').value = _c.user;
// 初始化登录UI
updateLoginUI();

// 每次打开检查登录状态
if(!sessionStorage.getItem('hp_admin_logged')){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('admin-screen').style.display='none';
}

let section='orders', filter='all', selectedId=null;
let cachedOrders=[], cachedContacts=[], cachedFiles=[];

setInterval(()=>{ document.getElementById('clock').textContent=new Date().toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); },1000);

// ── CHANGE PASSWORD ──
function openPwModal(){
  const c=getCreds();
  document.getElementById('new-user').value=c.user;
  ['cur-pass','new-pass','new-pass2'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pwOverlay').classList.add('active');
}
function closePwModal(){ document.getElementById('pwOverlay').classList.remove('active'); }
function changePassword(){
  const c=getCreds();
  const nu=document.getElementById('new-user').value.trim();
  const cp=document.getElementById('cur-pass').value;
  const np=document.getElementById('new-pass').value;
  const np2=document.getElementById('new-pass2').value;
  if(!nu){ showToast('⚠️ 账号名不能为空'); return; }
  if(cp!==c.pass){ showToast('⚠️ 当前密码错误'); return; }
  if(np.length<6){ showToast('⚠️ 新密码至少 6 位'); return; }
  if(np!==np2){ showToast('⚠️ 两次密码不一致'); return; }
  saveCreds({user:nu,pass:np});
  closePwModal();
  showToast('✅ 密码已更新！下次登录请使用新密码');
}

// ── REFRESH ──
async function refresh(){ await Promise.all([loadStats(),renderList()]); selectedId=null; renderDetailEmpty(); }

// ── STATS ──
async function loadStats(){
  const [{data:orders},{data:contacts}]=await Promise.all([
    sb.from('orders').select('status'),
    sb.from('contacts').select('status')
  ]);
  const o=orders||[], c=contacts||[];
  const pending=o.filter(x=>x.status==='pending').length;
  const done=o.filter(x=>x.status==='done').length;
  const newCt=c.filter(x=>x.status==='new').length;
  document.getElementById('stats-row').innerHTML=`
    <div class="sc"><span class="n">${o.length}</span><span class="l">润色任务总数</span></div>
    <div class="sc gold"><span class="n">${pending}</span><span class="l">待处理润色</span></div>
    <div class="sc"><span class="n">${done}</span><span class="l">已完成润色</span></div>
    <div class="sc blue"><span class="n">${c.length}</span><span class="l">联系咨询</span></div>
    <div class="sc rose"><span class="n">${newCt}</span><span class="l">新咨询未读</span></div>`;
  document.getElementById('cnt-orders').textContent=pending;
  document.getElementById('cnt-contacts').textContent=newCt;
}

// ── SECTION SWITCH ──
function switchSection(s){
  section=s; filter='all'; selectedId=null;
  ['orders','contacts','news'].forEach(x=>document.getElementById('stab-'+x).className='stab'+(x===s?' active':''));
  if(s==='news'){ renderNewsSection(); return; }
  renderList(); renderDetailEmpty();
}

// ── NEWS SECTION ──
let cachedNews=[], editingNewsId=null;
async function renderNewsSection(){
  const lp=document.getElementById('list-filter'), li=document.getElementById('list-items'), dp=document.getElementById('detail-panel');
  lp.innerHTML=`<button class="ftab active" onclick="showNewArticleForm()">+ 新建文章</button>`;
  li.innerHTML='<div class="empty-list">加载中…</div>';
  const {data}=await sb.from('news').select('*').order('created_at',{ascending:false});
  cachedNews=data||[];
  li.innerHTML=cachedNews.length?cachedNews.map(a=>`
    <div class="list-item${a.id===editingNewsId?' active':''}" onclick="editArticle('${a.id}')">
      <div class="li-top"><span class="li-id">${a.id.substring(0,8)}…</span><span class="li-dot ${a.published?'dot-done':'dot-pending'}"></span></div>
      <div class="li-meta">${a.category||'未分类'} · ${a.published?'已发布':'草稿'}</div>
      <div class="li-preview">${(a.title||'无标题').substring(0,50)}</div>
    </div>`).join(''):'<div class="empty-list">暂无文章</div>';
  showNewArticleForm();
}

function showNewArticleForm(){
  editingNewsId=null;
  document.getElementById('detail-panel').innerHTML=`
    <div class="od-head"><div class="od-head-left"><h3>新建文章</h3><div class="meta">填写内容后点击发布或保存草稿</div></div></div>
    <div class="news-form" id="news-form">
      <div class="nf-row">
        <div class="nf-group"><div class="nf-label">文章标题 *</div><input class="nf-input" id="nf-title" placeholder="输入文章标题"></div>
        <div class="nf-group"><div class="nf-label">分类标签</div><input class="nf-input" id="nf-category" placeholder="如：行业动态 / 研究报告"></div>
      </div>
      <div class="nf-row">
        <div class="nf-group"><div class="nf-label">作者</div><input class="nf-input" id="nf-author" placeholder="Smartypath 编辑团队" value="Smartypath 编辑团队"></div>
        <div class="nf-group"><div class="nf-label">封面 Emoji</div><input class="nf-input" id="nf-emoji" placeholder="📄" value="📄"></div>
      </div>
      <div class="nf-group"><div class="nf-label">摘要（显示在列表卡片）</div><input class="nf-input" id="nf-excerpt" placeholder="一句话介绍文章内容…"></div>
      <div class="nf-group"><div class="nf-label">正文内容 *（支持 HTML 标签）</div><textarea class="nf-textarea" id="nf-content" placeholder="在此输入文章正文内容…&#10;&#10;支持简单 HTML：&lt;p&gt; &lt;strong&gt; &lt;em&gt; &lt;h3&gt; &lt;ul&gt;&lt;li&gt; 等"></textarea></div>
    </div>
    <div class="action-bar">
      <div class="action-info">新文章</div>
      <div class="publish-bar">
        <button class="btn-save" onclick="saveArticle(false)">保存草稿</button>
        <button class="btn-done" onclick="saveArticle(true)">🌐 立即发布</button>
      </div>
    </div>`;
}

function editArticle(id){
  editingNewsId=id;
  const a=cachedNews.find(x=>x.id===id);if(!a)return;
  document.getElementById('detail-panel').innerHTML=`
    <div class="od-head">
      <div class="od-head-left"><h3>编辑文章</h3><div class="meta">${a.id} · ${new Date(a.created_at).toLocaleString('zh-CN')}</div></div>
      <div class="od-head-right"><span class="badge ${a.published?'badge-done':'badge-pending'}">${a.published?'已发布':'草稿'}</span></div>
    </div>
    <div class="news-form">
      <div class="nf-row">
        <div class="nf-group"><div class="nf-label">文章标题 *</div><input class="nf-input" id="nf-title" value="${escHtml(a.title||'')}"></div>
        <div class="nf-group"><div class="nf-label">分类标签</div><input class="nf-input" id="nf-category" value="${escHtml(a.category||'')}"></div>
      </div>
      <div class="nf-row">
        <div class="nf-group"><div class="nf-label">作者</div><input class="nf-input" id="nf-author" value="${escHtml(a.author||'Smartypath 编辑团队')}"></div>
        <div class="nf-group"><div class="nf-label">封面 Emoji</div><input class="nf-input" id="nf-emoji" value="${escHtml(a.emoji||'📄')}"></div>
      </div>
      <div class="nf-group"><div class="nf-label">摘要</div><input class="nf-input" id="nf-excerpt" value="${escHtml(a.excerpt||'')}"></div>
      <div class="nf-group"><div class="nf-label">正文内容</div><textarea class="nf-textarea" id="nf-content">${escHtml(a.content_html||a.content||'')}</textarea></div>
    </div>
    <div class="action-bar">
      <div class="action-info"><button class="btn-save" style="border-color:var(--rose);color:var(--rose);" onclick="deleteArticle('${a.id}')">🗑 删除</button></div>
      <div class="publish-bar">
        <button class="btn-save" onclick="saveArticle(false)">保存草稿</button>
        <button class="btn-done" onclick="saveArticle(true)">${a.published?'更新发布':'🌐 立即发布'}</button>
      </div>
    </div>`;
}

async function saveArticle(publish){
  const title=document.getElementById('nf-title')?.value.trim();
  const content=document.getElementById('nf-content')?.value.trim();
  if(!title){showToast('⚠️ 请填写文章标题');return;}
  if(!content){showToast('⚠️ 请填写文章内容');return;}
  const payload={
    title,
    category:document.getElementById('nf-category')?.value.trim()||'资讯',
    author:document.getElementById('nf-author')?.value.trim()||'Smartypath 编辑团队',
    emoji:document.getElementById('nf-emoji')?.value.trim()||'📄',
    excerpt:document.getElementById('nf-excerpt')?.value.trim(),
    content_html:content,
    content:content.replace(/<[^>]+>/g,''),
    published:publish,
    updated_at:new Date().toISOString()
  };
  let error;
  if(editingNewsId){
    ({error}=await sb.from('news').update(payload).eq('id',editingNewsId));
  } else {
    const id='NEWS'+Date.now();
    ({error}=await sb.from('news').insert({id,...payload,created_at:new Date().toISOString()}));
    editingNewsId=id;
  }
  if(error){showToast('⚠️ 保存失败：'+error.message);return;}
  showToast(publish?'🌐 文章已发布！':'✅ 草稿已保存');
  renderNewsSection();
}

async function deleteArticle(id){
  if(!confirm('确定删除这篇文章吗？此操作不可撤销。'))return;
  await sb.from('news').delete().eq('id',id);
  editingNewsId=null;
  showToast('🗑 文章已删除');
  renderNewsSection();
}

// ── LIST ──
async function renderList(){
  const fe=document.getElementById('list-filter'), ie=document.getElementById('list-items');
  ie.innerHTML='<div class="empty-list">加载中…</div>';
  if(section==='orders'){
    fe.innerHTML=`
      <button class="ftab ${filter==='all'?'active':''}" onclick="setFilter('all')">全部</button>
      <button class="ftab ${filter==='pending'?'active':''}" onclick="setFilter('pending')">待处理</button>
      <button class="ftab ${filter==='done'?'active':''}" onclick="setFilter('done')">已完成</button>`;
    let q=sb.from('orders').select('*').order('created_at',{ascending:false});
    if(filter!=='all') q=q.eq('status',filter);
    const {data}=await q; cachedOrders=data||[];
    if(!cachedOrders.length){ ie.innerHTML='<div class="empty-list">暂无任务</div>'; return; }
    ie.innerHTML=cachedOrders.map(o=>`
      <div class="list-item${o.id===selectedId?' active':''}" onclick="selectOrder('${o.id}')">
        <div class="li-top"><span class="li-id">${o.id}</span><span class="li-dot ${o.status==='done'?'dot-done':'dot-pending'}"></span></div>
        <div class="li-meta">${o.lang} · ${o.style} · ${o.word_count}词 · ${o.user_name}</div>
        <div class="li-preview">${(o.content||'').substring(0,80)}…</div>
      </div>`).join('');
  } else {
    fe.innerHTML=`
      <button class="ftab ${filter==='all'?'active':''}" onclick="setFilter('all')">全部</button>
      <button class="ftab ${filter==='new'?'active':''}" onclick="setFilter('new')">未读</button>
      <button class="ftab ${filter==='replied'?'active':''}" onclick="setFilter('replied')">已回复</button>`;
    let q=sb.from('contacts').select('*').order('created_at',{ascending:false});
    if(filter!=='all') q=q.eq('status',filter);
    const {data}=await q; cachedContacts=data||[];
    if(!cachedContacts.length){ ie.innerHTML='<div class="empty-list">暂无咨询</div>'; return; }
    ie.innerHTML=cachedContacts.map(c=>`
      <div class="list-item${c.id===selectedId?' active':''}" onclick="selectContact('${c.id}')">
        <div class="li-top"><span class="li-id">${c.id}</span><span class="li-dot ${c.status==='replied'?'dot-done':'dot-new'}"></span></div>
        <div class="li-meta">${c.name} · ${c.email} · ${c.lang}</div>
        <div class="li-preview">${c.note?c.note.substring(0,60):'（无备注）'}</div>
      </div>`).join('');
  }
}
function setFilter(f){ filter=f; renderList(); }

// ── ORDER DETAIL ──
async function selectOrder(id){
  selectedId=id;
  const o=cachedOrders.find(x=>x.id===id); if(!o) return;
  renderList();
  const done=o.status==='done';
  document.getElementById('detail-panel').innerHTML=`
    <div class="od-head">
      <div class="od-head-left">
        <h3>${o.lang} · ${o.style}</h3>
        <div class="meta">${o.id} · ${new Date(o.created_at).toLocaleString('zh-CN')} · ${o.word_count} 词<br>用户：${o.user_name} &lt;${o.user_email}&gt;${o.note?'<br>备注：'+o.note:''}</div>
      </div>
      <div class="od-head-right">
        <span class="badge ${done?'badge-done':'badge-pending'}">${done?'✓ 已完成':'⏳ 待处理'}</span>
        <button class="btn-sm" onclick="copyOText()">复制原文</button>
      </div>
    </div>
    <div class="dual-pane">
      <div class="pane">
        <div class="pane-head">原文<button class="copy-btn" onclick="copyOText()">复制</button></div>
        <div class="pane-body" id="od-original">${escHtml(o.content||'')}</div>
      </div>
      <div class="pane">
        <div class="pane-head">润色结果（在此编辑）<button class="copy-btn" onclick="copyRText()">复制</button></div>
        <textarea class="pane-edit" id="od-result" placeholder="在此粘贴或编写润色后的内容...">${escHtml(o.result||'')}</textarea>
      </div>
    </div>
    <div class="action-bar">
      <div class="action-info">用户邮箱：${o.user_email}${done?'  ·  完成于 '+new Date(o.done_at).toLocaleString('zh-CN'):''}</div>
      <div class="action-btns">
        <button class="btn-save" onclick="saveOrderDraft()">保存草稿</button>
        <button class="btn-done" id="btn-done" ${done?'disabled':''} onclick="markOrderDone()">${done?'已完成':'✅ 完成并通知用户'}</button>
      </div>
    </div>`;
}

function copyOText(){ navigator.clipboard.writeText(document.getElementById('od-original').textContent); showToast('✅ 原文已复制'); }
function copyRText(){ navigator.clipboard.writeText(document.getElementById('od-result').value); showToast('✅ 结果已复制'); }

async function saveOrderDraft(){
  if(!selectedId) return;
  const result=document.getElementById('od-result').value;
  await sb.from('orders').update({result}).eq('id',selectedId);
  const o=cachedOrders.find(x=>x.id===selectedId); if(o) o.result=result;
  showToast('✅ 草稿已保存');
}

async function markOrderDone(){
  if(!selectedId) return;
  const result=document.getElementById('od-result')?.value?.trim();
  if(!result){ showToast('⚠️ 请先填写润色结果'); return; }
  const now=new Date().toISOString();
  await sb.from('orders').update({result,status:'done',done_at:now}).eq('id',selectedId);
  const o=cachedOrders.find(x=>x.id===selectedId);
  if(o){ o.result=result; o.status='done'; o.done_at=now; }
  const subject=encodeURIComponent(`[Smartypath] 你的文章润色已完成 · 任务 ${selectedId}`);
  const body=encodeURIComponent(`你好 ${o?.user_name}，\n\n你的文章润色任务已完成！\n\n任务ID：${selectedId}\n语言：${o?.lang}\n风格：${o?.style}\n\n━━━━ 润色结果 ━━━━\n\n${result}\n\n━━━━━━━━━━━━━━━━\n\n如有问题请回复此邮件。\n\n— Smartypath 团队`);
  showToast('✅ 已完成！正在打开邮件客户端...');
  setTimeout(()=>window.open(`mailto:${o?.user_email}?subject=${subject}&body=${body}`),500);
  await loadStats(); renderList(); selectOrder(selectedId);
}

// ── CONTACT DETAIL ──
async function selectContact(id){
  selectedId=id;
  const c=cachedContacts.find(x=>x.id===id); if(!c) return;
  if(c.status==='new'){
    await sb.from('contacts').update({status:'read'}).eq('id',id);
    c.status='read'; loadStats();
  }
  // load files
  const {data:files}=await sb.from('contact_files').select('*').eq('contact_id',id);
  cachedFiles=files||[];
  renderList();
  document.getElementById('detail-panel').innerHTML=`
    <div class="od-head">
      <div class="od-head-left">
        <h3>咨询 · ${c.id}</h3>
        <div class="meta">${new Date(c.created_at).toLocaleString('zh-CN')} · ${c.lang} · ${c.style||''}</div>
      </div>
      <div class="od-head-right">
        <span class="badge ${c.status==='replied'?'badge-done':'badge-new'}">${c.status==='replied'?'✓ 已回复':c.status==='read'?'已读':'🔵 新咨询'}</span>
      </div>
    </div>
    <div class="contact-detail">
      <div class="cd-section">
        <div class="cd-label">联系人</div>
        <div class="cd-value">${escHtml(c.name)} &lt;<a href="mailto:${c.email}" style="color:var(--teal);">${c.email}</a>&gt;</div>
      </div>
      ${c.note?`<div class="cd-section"><div class="cd-label">备注</div><div class="cd-note">${escHtml(c.note)}</div></div>`:''}
      <div class="cd-section">
        <div class="cd-label">上传的文件（${cachedFiles.length} 个）</div>
        <div class="files-grid">
          ${cachedFiles.length?cachedFiles.map((f,i)=>`
            <div class="file-row">
              <span class="fname">📄 ${escHtml(f.file_name)}</span>
              <span class="fmeta">${((f.file_size||0)/1024).toFixed(0)} KB</span>
              <button class="btn-dl" onclick="downloadFile(${i})">⬇ 下载</button>
            </div>`).join(''):'<p style="color:var(--muted);font-size:.85rem;">无文件</p>'}
        </div>
      </div>
      <div class="cd-section">
        <div class="cd-label">回复内容</div>
        <textarea class="reply-area" id="ct-reply" placeholder="填写回复内容，例如报价和预计时间…">${escHtml(c.reply||'')}</textarea>
      </div>
    </div>
    <div class="action-bar">
      <div class="action-info">用户邮箱：${c.email}</div>
      <div class="action-btns">
        <button class="btn-save" onclick="saveContactReply()">保存草稿</button>
        <button class="btn-done" onclick="sendContactReply()">📧 发送邮件回复</button>
      </div>
    </div>`;
}

function downloadFile(idx){
  const f=cachedFiles[idx]; if(!f||!f.file_data) return;
  const a=document.createElement('a');
  a.href=f.file_data; a.download=f.file_name; a.click();
  showToast('⬇ 开始下载：'+f.file_name);
}

async function saveContactReply(){
  if(!selectedId) return;
  const reply=document.getElementById('ct-reply').value;
  await sb.from('contacts').update({reply}).eq('id',selectedId);
  const c=cachedContacts.find(x=>x.id===selectedId); if(c) c.reply=reply;
  showToast('✅ 草稿已保存');
}

async function sendContactReply(){
  if(!selectedId) return;
  const reply=document.getElementById('ct-reply')?.value?.trim();
  if(!reply){ showToast('⚠️ 请先填写回复内容'); return; }
  const now=new Date().toISOString();
  await sb.from('contacts').update({reply,status:'replied',replied_at:now}).eq('id',selectedId);
  const c=cachedContacts.find(x=>x.id===selectedId);
  if(c){ c.reply=reply; c.status='replied'; c.replied_at=now; }
  const subject=encodeURIComponent(`[Smartypath] 关于你的咨询 · ${selectedId}`);
  const body=encodeURIComponent(`你好 ${c?.name}，\n\n感谢你联系Smartypath！\n\n${reply}\n\n如有问题请随时回复。\n\n— Smartypath 团队`);
  showToast('📧 正在打开邮件客户端...');
  setTimeout(()=>window.open(`mailto:${c?.email}?subject=${subject}&body=${body}`),400);
  await loadStats(); renderList(); selectContact(selectedId);
}

function renderDetailEmpty(){ document.getElementById('detail-panel').innerHTML='<div class="detail-empty"><div class="icon">👈</div><p>从左侧选择一条记录</p></div>'; }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let tt;
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(tt); tt=setTimeout(()=>t.style.display='none',3400); }

document.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); section==='orders'?saveOrderDraft():saveContactReply(); } });
</script>
</body>
